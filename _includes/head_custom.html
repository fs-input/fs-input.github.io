<!-- 自定义样式：EUDC 自创字符字体 + 配色 + 表格移动端适配 -->
<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

<!-- 按语言路径设置 <html lang>，供 CSS :lang() 按语言切换字体
     （中文首页 url=/ 不匹配；/zh/ 子页排除以保持 _config.yml 的 lang: zh-CN）-->
{%- assign lang_seg = page.url | split: '/' -%}
{%- if lang_seg[1] and lang_seg[1] != 'zh' -%}
<script>document.documentElement.setAttribute('lang', '{{ lang_seg[1] }}');</script>
{%- endif -%}

<!-- 阿拉伯语（/ar/）右到左：在 <html> 上设 dir="rtl"，具体微调见 custom.css [dir="rtl"] 段 -->
{% if page.url contains '/ar/' %}
<script>document.documentElement.setAttribute('dir', 'rtl');</script>
{% endif %}
